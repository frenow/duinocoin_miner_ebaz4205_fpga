# Configuração do Minerador EBAZ 4205 DuinoCoin
# Edite este arquivo conforme suas necessidades

[UART]
# Porta serial da FPGA
# Windows: COM3, COM4, COM5, ...
# Linux: /dev/ttyUSB0, /dev/ttyACM0, ...
# Mac: /dev/tty.usbserial-*, /dev/tty.usbmodem*
port = COM20

# Taxa de transmissão (não altere sem recompilar FPGA)
baudrate = 115200

# Timeout de recepção em segundos
timeout = 60

[SERVER]
# Servidor DuinoCoin primário
address = 92.246.129.145
port = 5089

# Servidores alternativos (fallback)
# address_backup1 = 145.239.86.42
# address_backup2 = 51.75.34.139

[CREDENTIALS]
# Seu nome de usuário DuinoCoin
username = frenow

# Mining key (deixe como 'None' se não usar)
mining_key = None

[MINING]
# Dificuldade desejada: EASY, MEDIUM, HARD
# ⚠️  FPGA v1 suporta até 1.000.000 de dificuldade
# Se receber "BAD_RANGE", reduz para MEDIUM ou EASY
difficulty = MEDIUM

# Número máximo de tentativas de reconexão (0 = infinito)
max_retries = 0

# Tempo de espera antes de reconectar (segundos)
reconnect_delay = 5

[LOGGING]
# Diretório para armazenar logs de shares rejeitadas
log_dir = error_logs

# Nível de log: DEBUG, INFO, WARNING, ERROR
log_level = INFO

# Habilitar output colorido no terminal
colored_output = true

[HARDWARE]
# Número de cores SHA-1 em paralelo
# EBAZ 4205 padrão: 8 cores
num_cores = 8

# Clock da FPGA em MHz (informação apenas)
fpga_clock_mhz = 50

# LED indicators (GPIO mapping)
led_green = 1
led_red = 2
